<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drawflow-plus Basic Example</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .toolbar {
      width: 200px;
      background: #2c3e50;
      color: white;
      padding: 20px;
      overflow-y: auto;
    }

    .toolbar h2 {
      margin-bottom: 20px;
      font-size: 16px;
    }

    .toolbar-group {
      margin-bottom: 20px;
    }

    .toolbar-group label {
      display: block;
      font-size: 12px;
      margin-bottom: 10px;
      color: #ecf0f1;
    }

    .node-template {
      background: #34495e;
      border: 1px solid #7f8c8d;
      padding: 10px;
      margin-bottom: 10px;
      cursor: move;
      border-radius: 4px;
      user-select: none;
      transition: all 0.3s;
    }

    .node-template:hover {
      background: #455a64;
      transform: translateY(-2px);
    }

    .editor-area {
      flex: 1;
      background: white;
      border-left: 1px solid #ddd;
    }

    .drawflow {
      width: 100%;
      height: 100%;
    }

    .button {
      background: #3498db;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 10px;
      width: 100%;
      font-size: 12px;
      transition: background 0.3s;
    }

    .button:hover {
      background: #2980b9;
    }

    .button.danger {
      background: #e74c3c;
    }

    .button.danger:hover {
      background: #c0392b;
    }

    /* Custom node styles */
    .drawflow .drawflow-node {
      background: white;
      border: 2px solid #3498db;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .drawflow .drawflow-node.selected {
      border-color: #2ecc71;
      box-shadow: 0 2px 12px rgba(46,204,113,0.3);
    }

    .drawflow .drawflow-node .title {
      background: #3498db;
      color: white;
      padding: 8px;
      font-weight: bold;
      border-radius: 6px 6px 0 0;
    }

    .drawflow .drawflow-node .content {
      padding: 10px;
    }

    .drawflow .drawflow-node .input,
    .drawflow .drawflow-node .output {
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <h2>Nodes</h2>

      <div class="toolbar-group">
        <label>Input Nodes</label>
        <div class="node-template" draggable="true" data-node-type="input">
          <i class="fas fa-sign-in-alt"></i> Input
        </div>
        <div class="node-template" draggable="true" data-node-type="trigger">
          <i class="fas fa-play"></i> Trigger
        </div>
      </div>

      <div class="toolbar-group">
        <label>Processing</label>
        <div class="node-template" draggable="true" data-node-type="condition">
          <i class="fas fa-code-branch"></i> Condition
        </div>
        <div class="node-template" draggable="true" data-node-type="operation">
          <i class="fas fa-cog"></i> Operation
        </div>
      </div>

      <div class="toolbar-group">
        <label>Output Nodes</label>
        <div class="node-template" draggable="true" data-node-type="output">
          <i class="fas fa-sign-out-alt"></i> Output
        </div>
      </div>

      <hr style="margin: 20px 0; border: none; border-top: 1px solid #555;">

      <div class="toolbar-group">
        <button class="button" onclick="clearCanvas()">Clear Canvas</button>
        <button class="button" onclick="exportJSON()">Export JSON</button>
        <button class="button danger" onclick="deleteSelected()">Delete Selected</button>
      </div>
    </div>

    <div class="editor-area">
      <div id="drawflow" class="drawflow"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/drawflow@1.1.0/dist/drawflow.min.js"></script>
  <script src="../../dist/drawflow-plus.js"></script>
  <script src="app.js"></script>
</body>
</html>
